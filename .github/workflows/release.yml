name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate release docs
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify release files
        shell: pwsh
        run: |
          $required = @('README.md', 'CHANGELOG.md', 'LICENSE', 'AGENTS.md', 'VERSION')
          foreach ($path in $required) {
            if (-not (Test-Path $path)) { throw "Missing required file: $path" }
          }
          if (-not (Test-Path 'scripts')) { throw 'Missing scripts directory' }

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: AI Agent Tools ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## AI Agent Tools ${{ github.ref_name }}

            Windows-first local AI coding toolkit with multi-agent workflow docs, automation scripts, and dashboard utilities.

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for curated release notes.
